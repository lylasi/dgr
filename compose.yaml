services:
  pen-worker:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请设置 ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?请设置至少32位的 SESSION_SECRET}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      DATABASE_PATH: /app/data/pen-worker.db
      SESSION_MAX_AGE_DAYS: ${SESSION_MAX_AGE_DAYS:-180}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - pen_data:/app/data

volumes:
  pen_data:
