services:
  pen-worker:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      SESSION_SECRET: ${SESSION_SECRET:-local-docker-session-secret-change-before-public-use}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      DATABASE_PATH: /app/data/pen-worker.db
      SESSION_MAX_AGE_DAYS: ${SESSION_MAX_AGE_DAYS:-180}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - pen_data:/app/data

volumes:
  pen_data:
